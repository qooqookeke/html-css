<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table tag</title>
    <!-- 스타일 태그 -->
    <style>
        table {
            border: 1px solid black;
            border-collapse: collapse;
        }
        th, td {
            border : 1px solid black;
            padding: 12px;
        }
        .col1 {width: 80px;}
        .col2 {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <!-- header -->
<h1>table 기본</h1>
<table>
    <!-- 테이블 제목 -->
    <caption>
        프로필 테이블
    </caption>
    <!-- table row -->
<tr>
    <!-- table header 테이블 제목 -->
    <th>이름</th>
    <th>취미</th>
    <th>특기</th>
</tr>
<tr>
    <!-- tabel data 테이블 일반 열-->
    <td>홍길동</td>
    <td>도술</td>
    <td>축지법</td>
</tr>
<tr>
    <td>짐코딩</td>
    <td>헬스</td>
    <td>코딩</td>
</tr>
</table>
<hr>
<h1>table 그룹 태그</h1>
<table>
<caption>학급 점수</caption>
<colgroup>
    <col class="col1"/>
    <col class="col2"/>
    <col class="col3"/>
    <col class="col4"/>
    <col class="col5"/>
    <col class="col6"/>
</colgroup>
<thead>
<tr>
    <th>반</th>
    <th>이름</th>
    <th>국어</th>
    <th>영어</th>
    <th>수학</th>
    <th>코딩</th>
</tr>
</thead>
<tbody>
<tr>
    <td rowspan = "2"> 1반</td>
    <td>홍길동</td>
    <td>90</td>
    <td>100</td>
    <td>90</td>
    <td>81</td>
</tr>
<tr>
    <td>짐코딩</td>
    <td>85</td>
    <td>81</td>
    <td>95</td>
    <td>100</td>
</tr>
</tbody>
<!-- 테이블 하단 그룹 -->
<tfoot>
<tr>
    <td colspan="2">평균</td>
    <td>87.5</td>
    <td>90.5</td>
    <td>92.5</td>
    <td>80.5</td>
</tr>
</tfoot>
</table>
</body>
</html>
