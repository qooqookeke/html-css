<!-- Semantic 의미론적 -->
 <!-- 
  검색 엔진 최적화
  웹 접근성 향상
  가독성 향상 -->

  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic</title>
    <style>
        * {
            text-align: center;
        }
        header {
            border: 2px solid red;
            line-height: 55px;
            height: 55px;
        }
        nav {
            border: 2px solid blue;
            height: 110px;
        }
        main {
            border: 2px solid green;
            height: 300px;
            line-height: 300px;
        }
        footer {
            border: 2px solid black;
            height: 55px;
            line-height: 55px;
        }
        ul{
            list-style: none;
            padding-left: 0px;
        }
    </style>
  </head>
  <body>
    <header>header 영역</header>
    <nav><ul>
        <li>Menu1</li>
        <li>Menu2</li>
        <li>Menu3</li>
        <li>Menu4</li>
    </ul></nav>
    <main>Content 영역</main>
    <footer>footer 영역</footer>
    
  </body>
  </html>
