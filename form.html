<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>radio & checkbox</title>
</head>
<body>
    <form action="/sign">
        <div>
            <label for="username">아이디</label>
            <input type="text" id="username">
        </div>
        <div>
            <label for="password">비밀번호</label>
            <input type="password" id="password">
        </div>
        <input type="submit" value="제출하기">
    </form>
    <form action="">
        <fieldset>
            <legend>좋아하는 색상을 모두 선택해주세요</legend>
            <ul>
                <li>
                    <label for="red">빨강</label>
                    <input type="checkbox" id="red" value="red">
                </li>
                <li>
                    <label for="orange">주황</label>
                    <input type="checkbox" id="orange" value="orange">
                </li>
                <li>
                    <label for="yellow">노랑</label>
                    <input type="checkbox" id="yellow" value="yellow">
                </li>
                <li>
                    <label for="green">초록</label>
                    <input type="checkbox" id="green" value="green">
                </li>
                <li>
                    <label for="blue">파랑</label>
                    <input type="checkbox" id="blue" value="blue">
                </li>
            </ul>
        </fieldset>
        <fieldset>
            <legend>배송방법은?</legend>
            <ul>
                <li>
                    <label for="free">무료</label>
                    <input type="radio" name="delivery" id="free" value="free">
            </li>
            <li>
                <label for="pay">유료</label>
                <input type="radio" name="delivery" id="pay" value="pay">
            </li>
        </ul>
        </fieldset>

        <fieldset>
            <legend>자기소개서</legend>
            <!-- cols = 가로, rows=세로 -->
            <textarea name="" id="" cols="30" rows="5">안녕하세요</textarea>
        </fieldset>
        <fieldset>
            <legend>주문상품을 선택해주세요</legend>
            <ul>
                <li>
                    <!-- multiple 선택 여러개 선택가능 -->
                    <select name="goods" id="goods" multiple>
                        <!-- 실제로 옵션의 value 값이 서버에 전송됨 -->
                         <!-- selected =select의 디폴트 값 설정 -->
                        <option value="apple_10kg" selected>사과 10kg</option>
                        <option value="apple_20kg">사과 20kg</option>
                        <option value="apple_30kg">사과 30kg</option>
                        <option value="apple_40kg">사과 40kg</option>
                        <option value="apple_50kg">사과 50kg</option>
                    </select>
                </li>
                <li>
                    <label for="ice-cream-choice">맛을 선택하세요</label>
                    <input list="ice-cream-flavors" id="ice-cream-choice" name="ice-cream-choice" />
                    <datalist id="ice-cream-flavors">
                    <option value="Chocolate">
                    <option value="Coconut">
                    <option value="Mint">
                    <option value="Strawberry">
                    <option value="Vanilla">
                    </datalist>
                </li>
            </ul>
        </fieldset>
        <!-- 버튼을 누르면 action에서 잡은 url로 데이터가 보내짐 -->
        <button type="submit">제출하기</button>
        <button type="reset">리셋하기</button>
        <!-- 자바스크립트 코드를 실행할때 사용 메시지 알림창, 모달창? -->
        <button type="button" onclick="alert('hello world')">버튼</button>
        
    </form>
</body>
</html>
